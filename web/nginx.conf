server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;

  # Hashed build assets never change; the shell and service worker must not be
  # cached or the app will not update.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
  location = /sw.js {
    add_header Cache-Control "no-cache";
  }
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  # Single-page app: everything else falls through to the shell.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
